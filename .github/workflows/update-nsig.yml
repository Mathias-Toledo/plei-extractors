name: Update NSig Extractor + Plei Config

on:
  schedule:
    # Corre diario a las 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout plei-extractors
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Descargar YoutubeThrottlingParameterUtils.java de NewPipeExtractor
        run: |
          mkdir -p /tmp/newpipe
          curl -sSL \
            "https://raw.githubusercontent.com/TeamNewPipe/NewPipeExtractor/dev/extractor/src/main/java/org/schabi/newpipe/extractor/services/youtube/YoutubeThrottlingParameterUtils.java" \
            -o /tmp/newpipe/ThrottlingUtils.java
          echo "Descargado ThrottlingUtils.java ($(wc -c < /tmp/newpipe/ThrottlingUtils.java) bytes)"

      - name: Bundle bgutils.js para browser (IIFE con BgUtils.BG global)
        run: |
          npm install bgutils-js
          # Entry: dist/index.js (re-exporta todo como BG: { Challenge, PoToken, ... })
          # Con --global-name=BgUtils el resultado es window.BgUtils = { BG: {...}, default: {...} }
          # El WebView en PoTokenProvider.kt usa BgUtils.BG.Challenge.create() y BgUtils.BG.PoToken.generate()
          npx esbuild node_modules/bgutils-js/dist/index.js \
            --bundle --format=iife --global-name=BgUtils \
            --outfile=bgutils.js
          SIZE=$(wc -c < bgutils.js)
          echo "bgutils.js bundleado: ${SIZE} bytes"
          # Sanity check 1: tamaño mínimo 10KB
          if [ "$SIZE" -lt 10000 ]; then
            echo "WARN: bundle demasiado pequeño (${SIZE}B) — conservando versión anterior"
            git checkout -- bgutils.js 2>/dev/null || true
            exit 0
          fi
          # Sanity check 2: verificar que expone BgUtils.BG.Challenge y BgUtils.BG.PoToken
          node -e "
            const code = require('fs').readFileSync('bgutils.js', 'utf8');
            const fn = new Function(code + '; return typeof BgUtils !== \"undefined\" ? BgUtils : null;');
            const BgUtils = fn();
            if (!BgUtils || !BgUtils.BG || !BgUtils.BG.Challenge || !BgUtils.BG.PoToken) {
              console.error('ERROR: BgUtils.BG.Challenge o BgUtils.BG.PoToken no presentes — conservando versión anterior');
              process.exit(1);
            }
            console.log('OK: estructura BgUtils.BG validada (' + Object.keys(BgUtils.BG).join(', ') + ')');
          " || git checkout -- bgutils.js 2>/dev/null || true

      - name: Descargar yt-dlp _base.py
        run: |
          mkdir -p /tmp/ytdlp
          curl -sSL \
            "https://raw.githubusercontent.com/yt-dlp/yt-dlp/master/yt_dlp/extractor/youtube/_base.py" \
            -o /tmp/ytdlp/_base.py
          echo "Descargado _base.py ($(wc -c < /tmp/ytdlp/_base.py) bytes)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js (para test de validación)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar y validar nsig_extractor.js
        id: generate_nsig
        run: |
          python scripts/generate_nsig_extractor.py \
            --java /tmp/newpipe/ThrottlingUtils.java \
            --out nsig_extractor.js \
            --test
          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Generar plei-config.json
        id: generate_config
        run: |
          python scripts/generate_config.py \
            --ytdlp /tmp/ytdlp/_base.py \
            --out plei-config.json
          echo "status=ok" >> "$GITHUB_OUTPUT"

      # Ambos archivos son determinísticos (versión = hash de contenido).
      # Solo habrá diff si NewPipeExtractor o yt-dlp realmente actualizaron algo.

      - name: Verificar si hubo cambio
        id: diff
        run: |
          CHANGED=false
          if ! git diff --quiet nsig_extractor.js; then
            echo "nsig_extractor.js actualizado"
            git diff --stat nsig_extractor.js
            CHANGED=true
          fi
          if ! git diff --quiet plei-config.json; then
            echo "plei-config.json actualizado"
            git diff --stat plei-config.json
            CHANGED=true
          fi
          if ! git diff --quiet bgutils.js; then
            echo "bgutils.js actualizado"
            git diff --stat bgutils.js
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit y push si hubo cambio
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nsig_extractor.js plei-config.json bgutils.js
          git commit -m "chore: update extractors from upstream $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Resumen
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "Archivos actualizados y pusheados"
          else
            echo "Sin cambios — todo al dia"
          fi
